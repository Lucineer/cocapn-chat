<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cocapn — AI Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0B1426;
  --surface: #1E293B;
  --border: #334155;
  --text: #E2E8F0;
  --dim: #94A3B8;
  --accent: #00D4AA;
  --accent-dim: rgba(0,212,170,0.15);
  --user-bubble: #1E3A5F;
  --danger: #EF4444;
  --warn: #F59E0B;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.header h1 { font-size: 18px; font-weight: 600; }
.header h1 span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 12px; }
.model-select { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
.model-select:focus { outline: 1px solid var(--accent); border-color: var(--accent); }
.spend { font-size: 12px; color: var(--dim); }
.spend strong { color: var(--accent); font-weight: 600; }

/* Chat area */
.chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.msg { max-width: 720px; width: 100%; margin: 0 auto; animation: fadeIn 0.2s ease; }
.msg-user { margin-left: auto; }
.msg-user .bubble { background: var(--user-bubble); border-radius: 16px 16px 4px 16px; padding: 10px 16px; }
.msg-assistant .bubble { background: var(--surface); border: 1px solid var(--border); border-radius: 16px 16px 16px 4px; padding: 10px 16px; white-space: pre-wrap; word-break: break-word; line-height: 1.6; }
.msg-system { text-align: center; font-size: 12px; color: var(--dim); padding: 8px; }
.msg-meta { font-size: 11px; color: var(--dim); margin-top: 4px; }
.msg-assistant .msg-meta { text-align: right; }
.msg-error .bubble { border: 1px solid var(--danger); color: var(--danger); }

.typing { display: none; max-width: 720px; width: 100%; margin: 0 auto; }
.typing.visible { display: block; }
.typing .bubble { background: var(--surface); border: 1px solid var(--border); border-radius: 16px 16px 16px 4px; padding: 12px 18px; font-size: 13px; color: var(--dim); }
.typing-dots span { animation: blink 1.4s infinite both; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

/* Input */
.input-area { padding: 16px 20px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.input-row { max-width: 720px; margin: 0 auto; display: flex; gap: 8px; }
.input-row textarea { flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 12px; padding: 10px 16px; font-size: 14px; font-family: inherit; resize: none; max-height: 120px; line-height: 1.5; }
.input-row textarea:focus { outline: none; border-color: var(--accent); }
.input-row textarea::placeholder { color: var(--dim); }
.send-btn { background: var(--accent); color: var(--bg); border: none; border-radius: 12px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.send-btn:hover { opacity: 0.9; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Welcome */
.welcome { text-align: center; padding: 60px 20px; color: var(--dim); }
.welcome h2 { font-size: 24px; color: var(--text); margin-bottom: 8px; }
.welcome p { max-width: 400px; margin: 0 auto 24px; line-height: 1.6; }
.quick-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.quick-actions button { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; }
.quick-actions button:hover { border-color: var(--accent); color: var(--accent); }

/* Cost footer */
.cost-bar { text-align: center; padding: 6px; font-size: 11px; color: var(--dim); background: var(--bg); border-top: 1px solid var(--border); }
.cost-bar strong { color: var(--accent); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

@media (max-width: 600px) {
  .msg, .input-row, .typing, .welcome { max-width: 100%; }
  .header { padding: 10px 14px; }
  .chat { padding: 12px; }
}
</style>
</head>
<body>

<div class="header">
  <h1><span>cocapn</span>.ai</h1>
  <div class="header-right">
    <select class="model-select" id="modelSelect"></select>
    <div class="spend" id="spendDisplay"></div>
  </div>
</div>

<div class="chat" id="chat">
  <div class="welcome" id="welcome">
    <h2>What can I help with?</h2>
    <p>Chat with any AI model. Switch freely. See what it costs.</p>
    <div class="quick-actions">
      <button onclick="setInput('Explain quantum computing simply')">Explain quantum computing</button>
      <button onclick="setInput('Write a Python function to sort a list')">Write a sort function</button>
      <button onclick="setInput('What are the best practices for REST APIs?')">REST API best practices</button>
      <button onclick="setInput('Help me debug this error: TypeError: cannot read property of undefined')">Debug a TypeError</button>
    </div>
  </div>
  <div class="typing" id="typing">
    <div class="bubble"><span class="typing-dots"><span>●</span> <span>●</span> <span>●</span></span></div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="userInput" rows="1" placeholder="Message cocapn.ai..." onkeydown="handleKey(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
</div>

<div class="cost-bar" id="costBar">
  Raw cost: <strong>$0.000</strong> &nbsp;|&nbsp; Cocapn margin: <strong>$0.000</strong> &nbsp;|&nbsp; Tokens: <strong>0</strong>
</div>

<script>
// Models — these are the ones that actually work and are cheap
const MODELS = [
  { id: 'deepseek-chat', name: 'DeepSeek V3', provider: 'DeepSeek', costIn: 0.14, costOut: 0.28, desc: 'Best value, smart' },
  { id: 'deepseek-reasoner', name: 'DeepSeek R1', provider: 'DeepSeek', costIn: 0.55, costOut: 2.19, desc: 'Deep reasoning' },
  { id: 'gemini-2.5-flash', name: 'Gemini 2.5 Flash', provider: 'Google', costIn: 0.15, costOut: 0.60, desc: 'Fast, multimodal' },
  { id: 'gemini-2.5-pro', name: 'Gemini 2.5 Pro', provider: 'Google', costIn: 1.25, costOut: 10.00, desc: 'Most capable' },
  { id: 'gpt-4o-mini', name: 'GPT-4o Mini', provider: 'OpenAI', costIn: 0.15, costOut: 0.60, desc: 'Reliable, cheap' },
  { id: 'gpt-4o', name: 'GPT-4o', provider: 'OpenAI', costIn: 2.50, costOut: 10.00, desc: 'Strong all-around' },
  { id: 'claude-3-5-haiku', name: 'Claude 3.5 Haiku', provider: 'Anthropic', costIn: 0.80, costOut: 4.00, desc: 'Fast Claude' },
  { id: 'claude-3-5-sonnet', name: 'Claude 3.5 Sonnet', provider: 'Anthropic', costIn: 3.00, costOut: 15.00, desc: 'Best Claude' },
];

let messages = [];
let totalCostRaw = 0;
let totalTokensIn = 0;
let totalTokensOut = 0;
let currentModel = MODELS[0];

// Populate model selector
const sel = document.getElementById('modelSelect');
MODELS.forEach((m, i) => {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = `${m.name} ($${m.costIn}/M in)`;
  sel.appendChild(opt);
});
sel.addEventListener('change', () => { currentModel = MODELS[sel.value]; });

// Auto-resize textarea
const textarea = document.getElementById('userInput');
textarea.addEventListener('input', () => {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
});

function setInput(text) {
  textarea.value = text;
  textarea.focus();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function addMessage(role, content, meta = '') {
  const chat = document.getElementById('chat');
  const typing = document.getElementById('typing');
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.style.display = 'none';

  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  div.innerHTML = `<div class="bubble">${escapeHtml(content)}</div>${meta ? `<div class="msg-meta">${meta}</div>` : ''}`;
  chat.insertBefore(div, typing);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function showTyping(show) {
  document.getElementById('typing').classList.toggle('visible', show);
  const chat = document.getElementById('chat');
  if (show) chat.scrollTop = chat.scrollHeight;
}

function updateCostBar() {
  const marginRate = 0.02; // 2% for standard tier
  const margin = totalCostRaw * marginRate;
  document.getElementById('costBar').innerHTML =
    `Raw cost: <strong>$${totalCostRaw.toFixed(4)}</strong> &nbsp;|&nbsp; ` +
    `Cocapn margin: <strong>$${margin.toFixed(4)}</strong> &nbsp;|&nbsp; ` +
    `Tokens: <strong>${totalTokensIn.toLocaleString()} in / ${totalTokensOut.toLocaleString()} out</strong>`;
}

async function sendMessage() {
  const text = textarea.value.trim();
  if (!text) return;

  textarea.value = '';
  textarea.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  messages.push({ role: 'user', content: text });
  addMessage('user', text);
  showTyping(true);

  try {
    // Try the Cocapn proxy first, fall back to direct API
    let response;
    const useProxy = true; // Would be false if no proxy available

    if (useProxy) {
      // Direct to provider — in production this goes through cocapn.ai proxy
      // For now, we need an API key. The user provides theirs.
      response = await callProvider(currentModel, messages);
    }

    showTyping(false);
    const assistantText = response.content;
    messages.push({ role: 'assistant', content: assistantText });

    // Calculate cost
    const costIn = (response.tokensIn / 1_000_000) * currentModel.costIn;
    const costOut = (response.tokensOut / 1_000_000) * currentModel.costOut;
    totalCostRaw += costIn + costOut;
    totalTokensIn += response.tokensIn;
    totalTokensOut += response.tokensOut;
    updateCostBar();

    const meta = `${currentModel.name} · ${response.tokensIn + response.tokensOut} tokens · $${(costIn + costOut).toFixed(4)}`;
    addMessage('assistant', assistantText, meta);

  } catch (err) {
    showTyping(false);
    addMessage('error', `Error: ${err.message}`);
    // Remove failed user message from history
    messages.pop();
  }

  document.getElementById('sendBtn').disabled = false;
  textarea.focus();
}

async function callProvider(model, msgs) {
  // In production: POST to cocapn.ai/v1/chat/completions
  // For now: try direct DeepSeek (free tier available) or show setup prompt

  const API_KEYS = {
    'DeepSeek': localStorage.getItem('cocapn_key_deepseek') || '',
    'Google': localStorage.getItem('cocapn_key_google') || '',
    'OpenAI': localStorage.getItem('cocapn_key_openai') || '',
    'Anthropic': localStorage.getItem('cocapn_key_anthropic') || '',
  };

  let key = API_KEYS[model.provider];
  if (!key) {
    key = prompt(`Enter your ${model.provider} API key.\n\nIt stays in your browser — Cocapn never sees it.\n\nGet one at:\n${getKeyUrl(model.provider)}`);
    if (key) {
      localStorage.setItem(`cocapn_key_${model.provider.toLowerCase()}`, key);
      API_KEYS[model.provider] = key;
    }
  }

  if (!key) throw new Error('No API key provided');

  // Provider-specific endpoints and formats
  if (model.provider === 'Anthropic') {
    // Anthropic uses a different format
    const anthropicMsgs = msgs.filter(m => m.role !== 'system').map(m => ({
      role: m.role,
      content: m.content
    }));

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: model.id,
        max_tokens: 4096,
        messages: anthropicMsgs
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `Anthropic ${resp.status}`);
    }

    const data = await resp.json();
    return {
      content: data.content[0].text,
      tokensIn: data.usage.input_tokens,
      tokensOut: data.usage.output_tokens
    };

  } else {
    // OpenAI-compatible (DeepSeek, Google via OpenAI format, OpenAI)
    const baseUrl = model.provider === 'DeepSeek'
      ? 'https://api.deepseek.com'
      : model.provider === 'Google'
        ? 'https://generativelanguage.googleapis.com/v1beta/openai'
        : 'https://api.openai.com';

    const resp = await fetch(`${baseUrl}/v1/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${key}`
      },
      body: JSON.stringify({
        model: model.id,
        messages: msgs,
        max_tokens: 4096,
        stream: false
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `${model.provider} ${resp.status}`);
    }

    const data = await resp.json();
    return {
      content: data.choices[0].message.content,
      tokensIn: data.usage.prompt_tokens,
      tokensOut: data.usage.completion_tokens
    };
  }
}

function getKeyUrl(provider) {
  const urls = {
    'DeepSeek': 'https://platform.deepseek.com/api_keys',
    'Google': 'https://aistudio.google.com/apikey',
    'OpenAI': 'https://platform.openai.com/api-keys',
    'Anthropic': 'https://console.anthropic.com/settings/keys'
  };
  return urls[provider] || '';
}

// Keyboard shortcut: Ctrl+/ to clear chat
document.addEventListener('keydown', (e) => {
  if (e.ctrlKey && e.key === '/') {
    e.preventDefault();
    if (confirm('Clear chat history?')) {
      messages = [];
      totalCostRaw = 0;
      totalTokensIn = 0;
      totalTokensOut = 0;
      const chat = document.getElementById('chat');
      chat.innerHTML = '';
      // Re-add typing indicator
      chat.innerHTML = '<div class="typing" id="typing"><div class="bubble"><span class="typing-dots"><span>●</span> <span>●</span> <span>●</span></span></div></div>';
      updateCostBar();
    }
  }
});
</script>
</body>
</html>
