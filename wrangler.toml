name = "cocapn-chat"
main = "cocapn-proxy-worker.js"
compatibility_date = "2024-12-01"

# KV Namespaces (create via: wrangler kv:namespace create "USERS")
# [[kv_namespaces]]
# binding = "USERS"
# id = "your-kv-namespace-id"

# D1 Database (for production usage logging)
# [[d1_databases]]
# binding = "DB"
# database_name = "cocapn"
# database_id = "your-d1-id"

[vars]
ENVIRONMENT = "production"

# Secrets (set via: wrangler secret put <NAME>)
# JWT_SECRET = "your-random-secret"
# DEEPSEEK_API_KEY = ""
# GOOGLE_API_KEY = ""
# OPENAI_API_KEY = ""
# ANTHROPIC_API_KEY = ""
